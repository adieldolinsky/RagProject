<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial RAG Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="app">
        <header class="header">
            <div>
                <h1>Financial RAG Assistant</h1>
                <p>Ask questions about uploaded financial reports — with session memory</p>
            </div>
            <div class="header-actions">
                <button type="button" id="clear-chat" class="btn-ghost" title="Clear conversation">Clear chat</button>
            </div>
        </header>

        <main class="chat-main">
            <section id="messages" class="messages" aria-live="polite">
                <section class="welcome">
                    <h2>Financial Document Assistant</h2>
                    <p>Ask questions about the uploaded financial reports. Your conversation is saved for this session.</p>
                </section>
            </section>

            <div id="typing-indicator" class="typing-indicator" aria-hidden="true">
                <span></span><span></span><span></span>
            </div>

            <footer class="composer">
                <form id="chat-form">
                    <textarea
                        id="query-input"
                        name="query"
                        rows="1"
                        placeholder="Ask a question about the report…"
                        autocomplete="off"
                        required
                    ></textarea>
                    <button type="submit" id="send-btn" class="btn-send">Send</button>
                </form>
                <div id="loading-bar" class="loading-bar">
                    <span class="spinner" aria-hidden="true"></span>
                    <span>Retrieving context and generating answer…</span>
                </div>
            </footer>
        </main>
    </div>

    <div id="toast" class="toast" role="alert"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
